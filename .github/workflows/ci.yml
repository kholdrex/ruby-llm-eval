name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Pytest
        run: pytest -q

  e2e-stub:
    name: End-to-end pipeline (stub model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e "."
      - name: Build sandbox image
        run: docker build -t ruby-llm-eval-sandbox:latest sandbox/
      - name: Run seed tasks against the stub model
        # The stub returns each task's reference solution, so a healthy
        # pipeline must score 100% pass@1. This proves generate -> evaluate
        # -> report works end to end without any API keys.
        run: ruby-llm-eval run --provider stub --model stub -n 1 --tasks tasks
      - name: Assert overall pass@1 == 1.0
        run: |
          python - <<'PY'
          import glob, json, sys
          latest = sorted(glob.glob("results/run_*.json"))[-1]
          report = json.load(open(latest))
          score = report["overall_pass@1"]
          print(f"overall pass@1 = {score} (from {latest})")
          if score != 1.0:
              # Surface per-task statuses so a sandbox/permissions regression is
              # easy to diagnose straight from the CI log.
              for task in report["tasks"]:
                  print(f"  {task['task_id']}: {task['status_counts']}")
              sys.exit(f"Expected 1.0, got {score}")
          PY
