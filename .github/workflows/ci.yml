name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Pytest
        run: pytest -q

  e2e-stub:
    name: End-to-end pipeline (stub model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e "."
      - name: Build sandbox image
        run: docker build -t ruby-llm-eval-sandbox:latest sandbox/
      - name: Run seed tasks against the stub model
        # The stub returns each task's reference solution, so a healthy pipeline
        # must score 100% pass@1 AND 100% clean (references are idiomatic). This
        # proves generate -> evaluate -> style -> report works end to end without
        # any API keys.
        run: ruby-llm-eval run --provider stub --model stub -n 1 --tasks tasks --style --jobs 2
      - name: Assert pass@1 and clean rate are both 1.0
        run: |
          python - <<'PY'
          import glob, json, sys
          latest = sorted(glob.glob("results/run_*.json"))[-1]
          report = json.load(open(latest))
          score = report["overall_pass_at_k"]
          clean = report["overall_clean_rate"]
          print(f"overall {report['metric']} = {score}, clean = {clean} (from {latest})")
          if score != 1.0 or clean != 1.0:
              # Surface per-task detail so a regression is diagnosable from the log.
              for task in report["tasks"]:
                  print(f"  {task['task_id']}: {task['status_counts']} style={task['style']}")
              sys.exit(f"Expected pass@1=1.0 and clean=1.0, got {score} / {clean}")
          PY
      - name: Create temporary private tasks
        run: |
          mkdir -p /tmp/ruby-llm-eval-private-tasks/{900_private_double,901_private_decoy}
          printf 'ci-private\n' > /tmp/ruby-llm-eval-private-tasks/VERSION

          cat > /tmp/ruby-llm-eval-private-tasks/900_private_double/prompt.md <<'EOF'
          Implement `double_number(n)` and return `n * 2`.
          EOF
          cat > /tmp/ruby-llm-eval-private-tasks/900_private_double/solution_ref.rb <<'EOF'
          def double_number(n)
            n * 2
          end
          EOF
          cat > /tmp/ruby-llm-eval-private-tasks/900_private_double/test.rb <<'EOF'
          require "minitest/autorun"
          require_relative "solution"

          class PrivateDoubleTest < Minitest::Test
            def test_doubles_positive_number
              assert_equal 14, double_number(7)
            end

            def test_doubles_zero
              assert_equal 0, double_number(0)
            end
          end
          EOF

          # This decoy task intentionally has a bad reference solution. If the
          # --task filter is ignored, the stub run should fail in addition to
          # the report task-id assertion below.
          cat > /tmp/ruby-llm-eval-private-tasks/901_private_decoy/prompt.md <<'EOF'
          Implement `should_not_run`.
          EOF
          cat > /tmp/ruby-llm-eval-private-tasks/901_private_decoy/solution_ref.rb <<'EOF'
          def should_not_run
            :wrong
          end
          EOF
          cat > /tmp/ruby-llm-eval-private-tasks/901_private_decoy/test.rb <<'EOF'
          require "minitest/autorun"
          require_relative "solution"

          class PrivateDecoyTest < Minitest::Test
            def test_decoy
              assert_equal :ok, should_not_run
            end
          end
          EOF
      - name: Run selected private task against the stub model
        run: >-
          ruby-llm-eval run --provider stub --model stub -n 1
          --tasks /tmp/ruby-llm-eval-private-tasks
          --task 900_private_double
          --output results-private
      - name: Assert only selected private task passed
        run: |
          python - <<'PY'
          import glob, json, sys

          reports = sorted(glob.glob("results-private/run_*.json"))
          if not reports:
              sys.exit("Expected a private-task report in results-private/.")

          latest = reports[-1]
          report = json.load(open(latest))
          score = report["overall_pass_at_k"]
          task_ids = [task["task_id"] for task in report["tasks"]]

          print(f"overall {report['metric']} = {score} (from {latest})")
          print(f"tasks: {task_ids}")

          if score != 1.0:
              sys.exit(f"Expected 1.0, got {score}")
          if task_ids != ["900_private_double"]:
              sys.exit(f"Expected only 900_private_double to run, got {task_ids}")
          PY
