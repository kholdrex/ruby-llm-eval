# Per-model token prices in USD per 1,000,000 tokens.
#
# These are approximate list prices for convenience — VERIFY against your
# provider's current pricing page and edit freely. Models not listed here still
# run fine; their cost is simply reported as "n/a".
#
# Used by ruby_llm_eval/report.py to turn token counts into a dollar estimate.

models:
  stub:
    input: 0.0
    output: 0.0

  # Anthropic
  claude-opus-4-8:
    input: 15.0
    output: 75.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-haiku-4-5-20251001:
    input: 1.0
    output: 5.0

  # OpenAI
  gpt-4o:
    input: 2.5
    output: 10.0
  gpt-4o-mini:
    input: 0.15
    output: 0.6
  o4-mini:
    input: 1.1
    output: 4.4
